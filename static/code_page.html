<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 代码助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: #2d2d2d;
            padding: 15px 20px;
            border-bottom: 1px solid #404040;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0084ff;
            color: #fff;
        }

        .message.assistant {
            align-self: flex-start;
            background: #2d2d2d;
            border: 1px solid #404040;
        }

        .message pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message code {
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        /* 输入区域 */
        .input-container {
            background: #2d2d2d;
            padding: 15px 20px;
            border-top: 1px solid #404040;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 12px 15px;
            color: #e0e0e0;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            outline: none;
        }

        #messageInput:focus {
            border-color: #0084ff;
        }

        #sendBtn {
            background: #0084ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #sendBtn:hover {
            background: #0073e6;
        }

        #sendBtn:disabled {
            background: #404040;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .loading {
            align-self: flex-start;
            padding: 12px 16px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .message {
                max-width: 90%;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            #sendBtn {
                padding: 12px 16px;
            }
        }

        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #505050;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Claude 代码助手</h1>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-container">
        <textarea 
            id="messageInput" 
            placeholder="输入消息... (回车发送，Shift+回车换行)"
            rows="1"
        ></textarea>
        <button id="sendBtn">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let isLoading = false;

        // 添加消息到聊天区域
        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // 简单的 Markdown 代码块处理
            const formattedContent = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            
            messageDiv.innerHTML = formattedContent;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // 添加加载动画
        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loadingIndicator';
            loadingDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();
        }

        // 移除加载动画
        function removeLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        // 滚动到底部
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // 添加用户消息
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 显示加载状态
            isLoading = true;
            sendBtn.disabled = true;
            addLoading();

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', '/code/chat?msg='+encodeURIComponent(message), true);

                xhr.onload = function() {
                    removeLoading();
                    isLoading = false;
                    sendBtn.disabled = false;

                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        addMessage(response.reply, 'assistant');
                    } else {
                        addMessage('❌ 请求失败: ' + xhr.status, 'assistant');
                    }
                };

                xhr.onerror = function() {
                    removeLoading();
                    isLoading = false;
                    sendBtn.disabled = false;
                    addMessage('❌ 网络错误，请重试', 'assistant');
                };

                xhr.send();

            } catch (error) {
                removeLoading();
                isLoading = false;
                sendBtn.disabled = false;
                addMessage('❌ 发送失败: ' + error.message, 'assistant');
            }
        }

        // 发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);

        // 输入框回车事件
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 自动调整输入框高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 初始欢迎消息
        addMessage('你好！我是 Claude 代码助手，可以帮你解决编程和服务器运维问题。有什么可以帮你的吗？', 'assistant');
    </script>
</body>
</html>
